<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIZIGNERI — Comic Burst</title>
  <link rel="stylesheet" href="{% static 'css/index.css' %}" />
</head>
<body>
  <div class="page-transition-layer" aria-hidden="true"></div>

  <main class="scene">
    <div class="blob left"></div>
    <div class="blob right"></div>
    <div class="ring"></div>

    <div class="mini-burst b1"></div>
    <div class="mini-burst b2"></div>
    <div class="mini-burst b3"></div>
    <div class="mini-burst b4"></div>

    <div class="sticker s1">
      <div class="sticker-card" title="Книга">
        <svg viewBox="0 0 24 24" fill="none"><path class="icon-stroke" d="M4 6.5C4 5.12 5.12 4 6.5 4H10c1 0 1.9.4 2.54 1.05.65-.65 1.54-1.05 2.55-1.05h2.41C18.88 4 20 5.12 20 6.5V18c0 .55-.45 1-1 1h-3.91c-.95 0-1.85.38-2.52 1.05L12 20.62l-.57-.57A3.56 3.56 0 0 0 8.91 19H5c-.55 0-1-.45-1-1V6.5Z"/><path class="icon-stroke" d="M12.5 5.1V20"/><path class="icon-stroke" d="M7 8.5h2.5M7 11h2M14.5 8.5H17M14.5 11H16.5"/></svg>
      </div>
    </div>

    <div class="sticker s2">
      <div class="sticker-card" title="Карандаш">
        <svg viewBox="0 0 24 24" fill="none"><path class="icon-stroke" d="M3 21l3-1 11-11-2-2L4 18l-1 3Z"/><path class="icon-stroke" d="M14 5l2 2"/><path class="icon-stroke" d="M17.5 3.5 20 6l-1.5 1.5L16 5l1.5-1.5Z"/></svg>
      </div>
    </div>

    <div class="sticker s3">
      <div class="sticker-card" title="Сертификат">
        <svg viewBox="0 0 24 24" fill="none"><path class="icon-stroke" d="M7 4h10l3 3v9.5A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-10A2.5 2.5 0 0 1 6.5 4Z"/><path class="icon-stroke" d="M14 4v4h4"/><path class="icon-stroke" d="M8 11h8M8 14h5"/><path class="icon-stroke" d="M9.2 18.2 12 16.5l2.8 1.7-.75-3.18 2.45-2.1-3.22-.28L12 9.7l-1.28 2.94-3.22.28 2.45 2.1z"/></svg>
      </div>
    </div>

    <div class="sticker s4">
      <div class="sticker-card" title="Выпускная шапка">
        <svg viewBox="0 0 24 24" fill="none"><path class="icon-stroke" d="M3 9.5 12 4l9 5.5-9 5.5-9-5.5Z"/><path class="icon-stroke" d="M6.5 12.1V15c0 1.7 2.47 3 5.5 3s5.5-1.3 5.5-3v-2.9"/><path class="icon-stroke" d="M21 9.5V14"/></svg>
      </div>
    </div>

    <div class="sticker s5">
      <div class="sticker-card" title="Доска">
        <svg viewBox="0 0 24 24" fill="none"><rect class="icon-stroke" x="4" y="5" width="16" height="11" rx="2"/><path class="icon-stroke" d="M8 19h8"/><path class="icon-stroke" d="M10 16v3M14 16v3"/><path class="icon-stroke" d="M7.5 9h9M7.5 12h5"/></svg>
      </div>
    </div>

    <div class="sticker s6">
      <div class="sticker-card" title="План-конспект">
        <svg viewBox="0 0 24 24" fill="none"><rect class="icon-stroke" x="5" y="4" width="14" height="16" rx="2"/><path class="icon-stroke" d="M8 8h7M8 12h7M8 16h4"/><path class="icon-stroke" d="M6.5 2.8h3M14.5 2.8h3"/></svg>
      </div>
    </div>

    <div class="sticker s7">
      <div class="sticker-card" title="Figma">
        <svg viewBox="0 0 24 24" fill="none" aria-label="Figma icon">
          <rect class="figma-stroke" x="7" y="3" width="5" height="5" rx="2.5" fill="#F24E1E"/>
          <rect class="figma-stroke" x="12" y="3" width="5" height="5" rx="2.5" fill="#FF7262"/>
          <rect class="figma-stroke" x="7" y="8" width="5" height="5" rx="2.5" fill="#A259FF"/>
          <circle class="figma-stroke" cx="14.5" cy="10.5" r="2.5" fill="#1ABCFE"/>
          <rect class="figma-stroke" x="7" y="13" width="5" height="5" rx="2.5" fill="#0ACF83"/>
        </svg>
      </div>
    </div>

    <div class="sticker s8">
      <div class="sticker-card" title="Figma">
        <svg viewBox="0 0 24 24" fill="none" aria-label="Figma icon">
          <rect class="figma-stroke" x="7" y="3" width="5" height="5" rx="2.5" fill="#F24E1E"/>
          <rect class="figma-stroke" x="12" y="3" width="5" height="5" rx="2.5" fill="#FF7262"/>
          <rect class="figma-stroke" x="7" y="8" width="5" height="5" rx="2.5" fill="#A259FF"/>
          <circle class="figma-stroke" cx="14.5" cy="10.5" r="2.5" fill="#1ABCFE"/>
          <rect class="figma-stroke" x="7" y="13" width="5" height="5" rx="2.5" fill="#0ACF83"/>
        </svg>
      </div>
    </div>

    <div class="icon-float i1">
      <svg viewBox="0 0 24 24" fill="none"><path class="white-stroke" d="M3 7h18M5 7l1 10h12l1-10M9 7V4h6v3M8 11h8M8 14h6"/></svg>
    </div>

    <div class="icon-float i2">
      <svg viewBox="0 0 24 24" fill="none"><circle class="white-stroke" cx="7" cy="7" r="3"/><circle class="white-stroke" cx="17" cy="7" r="3"/><circle class="white-stroke" cx="7" cy="17" r="3"/><path class="white-stroke" d="M14 14h6v6h-6z"/></svg>
    </div>

    <div class="burst-main"><div class="inner"></div></div>

    <div class="badge top">WELCOME</div>
    <a href="{% url 'registration' %}" class="badge bottom cta-button">Перейти к регистрации</a>

    <section class="center">
      <div class="word-stage">
        <div class="word-fit" id="wordFit">
          <div class="word-shadow">DIZIGNERI</div>
          <div class="word-plate"></div>
          <h1 class="word" id="word" aria-label="DIZIGNERI"></h1>
        </div>
      </div>
    </section>
  </main>

  <script src="{% static 'js/index-main.js' %}" defer></script>

  <script src="{% static 'js/index-transition.js' %}" defer></script>

</body>
</html>
