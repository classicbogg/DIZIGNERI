services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      USE_SQLITE: "0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: sielom
      DB_USER: sielom
      DB_PASSWORD: 123
      DJANGO_DEBUG: "0"
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sielom
      POSTGRES_USER: sielom
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data: